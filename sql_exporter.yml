global:
  scrape_timeout_offset: 500ms
  min_interval: 0s

target:
  data_source_name: 'postgresql://monitor:monitor123@postgres:5432/monitoring?sslmode=disable'
  collectors:
    - packages_collector

collectors:
  - collector_name: packages_collector
    metrics:
      - metric_name: packages_total
        type: gauge
        help: Total number of packages installed
        values: [count]
        query: |
          SELECT COUNT(*) as count
          FROM packages
          WHERE collected_at = (SELECT MAX(collected_at) FROM packages)