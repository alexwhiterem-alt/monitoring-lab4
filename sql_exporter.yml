global:
  scrape_timeout_offset: 500ms
  min_interval: 0s

target:
  data_source_name: 'postgresql://monitor:monitor123@postgres:5432/monitoring?sslmode=disable'
  collectors:
    - packages_collector
    - vulns_collector

collectors:
  - collector_name: packages_collector
    metrics:
      - metric_name: packages_total
        type: gauge
        help: Total number of packages installed
        values: [count]
        query: |
          SELECT COUNT(*) as count
          FROM packages
          WHERE collected_at = (SELECT MAX(collected_at) FROM packages)

  - collector_name: vulns_collector
    metrics:
      - metric_name: vulns_critical
        type: gauge
        help: Number of critical vulnerabilities
        values: [count]
        query: |
          SELECT COUNT(*) as count
          FROM package_vulnerabilities pv
          JOIN vulnerabilities v ON pv.vuln_id = v.vuln_id
          WHERE pv.collected_at = (SELECT MAX(collected_at) FROM package_vulnerabilities)
          AND UPPER(v.severity) = 'CRITICAL'

      - metric_name: vulns_high
        type: gauge
        help: Number of high vulnerabilities
        values: [count]
        query: |
          SELECT COUNT(*) as count
          FROM package_vulnerabilities pv
          JOIN vulnerabilities v ON pv.vuln_id = v.vuln_id
          WHERE pv.collected_at = (SELECT MAX(collected_at) FROM package_vulnerabilities)
          AND UPPER(v.severity) = 'HIGH'

      - metric_name: vulns_medium
        type: gauge
        help: Number of medium vulnerabilities
        values: [count]
        query: |
          SELECT COUNT(*) as count
          FROM package_vulnerabilities pv
          JOIN vulnerabilities v ON pv.vuln_id = v.vuln_id
          WHERE pv.collected_at = (SELECT MAX(collected_at) FROM package_vulnerabilities)
          AND UPPER(v.severity) = 'MEDIUM'

      - metric_name: vulns_low
        type: gauge
        help: Number of low vulnerabilities
        values: [count]
        query: |
          SELECT COUNT(*) as count
          FROM package_vulnerabilities pv
          JOIN vulnerabilities v ON pv.vuln_id = v.vuln_id
          WHERE pv.collected_at = (SELECT MAX(collected_at) FROM package_vulnerabilities)
          AND UPPER(v.severity) = 'LOW'

      - metric_name: vulns_total
        type: gauge
        help: Total number of vulnerabilities
        values: [count]
        query: |
          SELECT COUNT(*) as count
          FROM package_vulnerabilities
          WHERE collected_at = (SELECT MAX(collected_at) FROM package_vulnerabilities)